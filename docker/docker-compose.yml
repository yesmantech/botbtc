# ============================================================================
# BTC MT5 → BingX Scalper — Docker Compose
# ============================================================================
# Infrastructure services only. The Go server runs natively for low latency.
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: scalper-postgres
    environment:
      POSTGRES_DB: scalper
      POSTGRES_USER: scalper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scalper_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalper"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: scalper-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:11.1.0
    container_name: scalper-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
